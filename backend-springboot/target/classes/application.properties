server.port=5000
server.servlet.context-path=/api

spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST:interchange.proxy.rlwy.net}:${MYSQLPORT:16458}/${MYSQLDATABASE:railway}?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:password}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-this-secret-key-change-this-secret-key}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

app.upload.base-dir=${UPLOAD_DIR:uploads}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
